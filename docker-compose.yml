services:
  app:
    image: serversideup/php:8.4-fpm-nginx
    container_name: mua_app
    restart: unless-stopped
    ports:
      - "8082:8080"
    volumes:
      - .:/var/www/html
    environment:
      - PHP_OPCACHE_ENABLE=1

  worker:
    image: serversideup/php:8.4-cli
    container_name: mua_worker
    restart: unless-stopped
    working_dir: /var/www/html
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--timeout=90", "--max-time=3600"]
    volumes:
      - .:/var/www/html
    depends_on:
      - app
